services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_DB: microservices_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: miguel

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

    networks:
      - microservices-network

  eureka-server:
    build:
      context: ./eureka-server

    container_name: eureka-server

    ports:
      - "8761:8761"

    depends_on:
      - postgres

    networks:
      - microservices-network

  gateway-service:
    build:
      context: ./gateway-service

    container_name: gateway-service

    ports:
      - "8080:8080"

    depends_on:
      - eureka-server

    networks:
      - microservices-network

  vehicle-service-ms:
    build:
      context: ./vehicle-service-ms

    container_name: vehicle-service-ms

    ports:
      - "8081:8081"

    depends_on:
      - postgres
      - eureka-server

    networks:
      - microservices-network

  operation-service-ms:
    build:
      context: ./operation-service-ms

    container_name: operation-service-ms

    ports:
      - "8083:8083"

    depends_on:
      - postgres
      - eureka-server

    networks:
      - microservices-network

networks:
  microservices-network:

volumes:
  postgres_data: